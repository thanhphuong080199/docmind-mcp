docmind:
  docs-dir: ./docs-inbox
  scan-on-startup: false
  similarity-threshold: 0.60
  rescan-enabled: false
  rescan-interval: PT10M
  # Confluence Cloud ingestion (Milestone 7). Leave base-url unset to disable entirely.
  # confluence:
  #   base-url: https://yourcompany.atlassian.net   # no trailing /wiki
  #   email: you@company.com
  #   api-token: ${CONFLUENCE_API_TOKEN}            # env var only — never commit
  #   space-keys: [DOCS, ENG]
  #   sync-enabled: false
  #   sync-interval: PT1H

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docmind
    username: docmind
    password: docmind
  ai:
    model:
      chat: ollama
    mcp:
      server:
        name: docmind
        version: 0.1.0
        protocol: STREAMABLE
        instructions: "Semantic search over locally ingested technical documentation. Use search_docs to ground answers in the user's own docs."
        streamable-http:
          mcp-endpoint: /mcp
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        model: qwen3:4b
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE
