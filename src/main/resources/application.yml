docmind:
  docs-dir: ./docs-inbox
  scan-on-startup: false

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docmind
    username: docmind
    password: docmind
  ai:
    model:
      chat: none
    mcp:
      server:
        name: docmind
        version: 0.1.0
        protocol: STREAMABLE
        instructions: "Semantic search over locally ingested technical documentation. Use search_docs to ground answers in the user's own docs."
        streamable-http:
          mcp-endpoint: /mcp
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE
